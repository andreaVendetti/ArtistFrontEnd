<div style="display: block;" 
     (mouseenter)="show()" 
     (mouseleave)="hide()">
  
  <a style="font-size: xx-large; color: black; cursor: pointer;"
        (click)="toggleMenu()">
    Paolo Frattarola
  </a>

  @if (mouseIn) {

    <div class="enter-container">
      <div (click)="chiudiMenu()">
        <a routerLink="/" style="color: black;">Home</a>
      </div>
      <div (click)="chiudiMenu()">
        <a routerLink="/works" style="color: black;">Works</a>
      </div>
      <div (click)="chiudiMenu()">
        <a routerLink="/about" style="color: black;">Profile</a>
      </div>
      @if(auth.isAdmin()){
          <div>
            <a routerLink="/admin" style="color: black;">Admin</a>
          </div>
      }
    </div>
  }
</div>
