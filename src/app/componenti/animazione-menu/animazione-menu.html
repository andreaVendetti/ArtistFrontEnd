    Paul Frattarola
  </a>
  
  @if (mouseIn()) {
    <div class="enter-container" animate.enter="enter-animation" animate.leave="leaving" >
      <div>
        <a nz-button nz-type="text" routerLink="/" style="color: black;">Home</a>
      </div>
      <div>
        <a nz-button nz-type="text" routerLink="/works" style="color: black;">Works</a>
      </div>
    </div>
  }
</div>
