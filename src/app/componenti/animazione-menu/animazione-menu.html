<div   style="display: block;" (mouseenter)="show()" (mouseleave)="hide()" (click)="mouseIn.set(false)">
  <a nz-button nzType="text"   style="font-size: xx-large; color: black;">
    Paul Frattarola
  </a>
  
  @if (mouseIn()) {
    <div class="enter-container" animate.enter="enter-animation" animate.leave="leaving" >
      <div>
        <a nz-button nz-type="text" routerLink="/" style="color: black;">Home</a>
      </div>
      <div>
        <a nz-button nz-type="text" routerLink="/works" style="color: black;">Works</a>
      </div>
      <div>
        <a nz-button nz-type="text" routerLink="/about" style="color: black;">Profile</a>
      </div>
      @if(auth.isAdmin()){
        <div>
        <a nz-button nz-type="text" routerLink="/admin" style="color: black;">Admin</a>
      </div>
      }
    </div>
  }
</div>
