<div class="menu-wrapper" [class.aperto]="mouseIn" 
     (mouseenter)="show()" 
     (mouseleave)="hide()">
  
  <a  class="titolo-menu"
        (click)="toggleMenu()">
    Paolo Frattarola
  </a>

  <div class="enter-container" style="font-size: 28px;" [class.leaving]="!mouseIn">
    <div class="divElement" (click)="chiudiMenu()">
      <a routerLink="/" style="color: black;">Home</a>
    </div>
    <div class="divElement" (click)="chiudiMenu()">
      <a routerLink="/works" style="color: black;">Works</a>
    </div>
    <div class="divElement" (click)="chiudiMenu()">
      <a routerLink="/about" style="color: black;">Profile</a>
    </div>
    @if(auth.isAdmin()){
      <div class="divElement">
        <a routerLink="/admin" style="color: black;">Admin</a>
      </div>
    }
  </div>
</div>
