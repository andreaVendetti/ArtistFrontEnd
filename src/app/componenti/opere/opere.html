<div class="lista-opere">
  @for (opera of opere; track $index) {
    @if(opera.work == true) {
      <div class="card">
        <div class="card-img">
          <img [src]="opera.imgPath" [alt]="opera.titolo">
        </div>
        <div class="card-info">
          <h3>{{ opera.titolo }}</h3>
          <p>{{opera.anno}};{{ opera.descrizione}}</p>
          
        </div>
        @if(auth.isAdmin()) {
          <div class="card-actions">
            <button (click)="modifica(opera.id)">Modifica</button>
            <button (click)="elimina(opera.id)">Elimina</button>
          </div>
        }
      </div>
    }
  }
</div>
