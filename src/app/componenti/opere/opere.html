<div class="carosello-wrapper">
  <button class="freccia sinistra" (click)="prev()">&#8592;</button>

  <div class="carosello">
    @for (opera of opereVisibili(); track $index) {
      <div class="card">
        <div class="card-img">
          <img [src]="opera.imgPath" [alt]="opera.titolo">
        </div>
        <div class="card-info">
          <h3>{{ opera.titolo }}</h3>
          <p>{{ opera.anno }}; {{ opera.descrizione }}</p>
        </div>
        @if(auth.isAdmin()) {
          <div class="card-actions">
            <button (click)="modifica(opera.id)">Modifica</button>
            <button (click)="elimina(opera.id)">Elimina</button>
          </div>
        }
      </div>
    }
  </div>

  <button class="freccia destra" (click)="next()">&#8594;</button>
</div>
